<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>醫師個人品牌人設定位量表</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Noto+Sans+TC:wght@300;400;500;600;700&family=Noto+Serif+TC:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F0E8;
    --paper: #FBF8F3;
    --ink: #1A1614;
    --ink-soft: #6B635C;
    --ink-faint: #8A7F73;
    --line: #D4CCC0;
    --line-soft: #E5DDD0;
    --accent: #B85C38;
    --serif: 'Noto Serif TC', serif;
    --display: 'Fraunces', serif;
    --sans: 'Noto Sans TC', sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: var(--sans);
    color: var(--ink);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    padding: 24px 16px;
  }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
    background: var(--paper);
    border: 1px solid var(--line);
    padding: 40px 32px;
  }
  .footer-tag {
    text-align: center;
    margin-top: 24px;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
    font-family: var(--display);
    text-transform: uppercase;
  }

  /* Welcome */
  .welcome { text-align: center; padding: 60px 24px; }
  .welcome .eyebrow {
    font-size: 11px; letter-spacing: 0.3em; color: var(--accent);
    margin-bottom: 24px; text-transform: uppercase; font-family: var(--display);
  }
  .welcome h1 {
    font-family: var(--serif); font-size: 36px; font-weight: 600;
    color: var(--ink); line-height: 1.3; margin: 0 0 20px; letter-spacing: 0.02em;
  }
  .welcome p {
    font-size: 15px; color: var(--ink-soft); line-height: 1.8;
    max-width: 460px; margin: 0 auto 40px;
  }
  .stats { display: flex; justify-content: center; gap: 32px; margin-bottom: 48px; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat .num { font-family: var(--display); font-size: 32px; font-weight: 500; color: var(--ink); }
  .stat .lbl { font-size: 11px; letter-spacing: 0.1em; color: var(--ink-faint); text-transform: uppercase; margin-top: 4px; }

  /* Buttons */
  .btn-primary {
    padding: 16px 48px; background: var(--ink); color: var(--paper);
    border: none; font-family: var(--sans); font-size: 14px;
    letter-spacing: 0.1em; cursor: pointer; font-weight: 500;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:disabled { background: #C8BFB1; cursor: not-allowed; }
  .btn-secondary {
    padding: 14px 28px; background: transparent; border: 1px solid var(--ink);
    color: var(--ink); font-family: var(--sans); font-size: 14px;
    letter-spacing: 0.05em; cursor: pointer; font-weight: 500;
  }
  .nav-buttons {
    display: flex; justify-content: space-between; margin-top: 40px; gap: 12px;
  }
  .nav-buttons .placeholder { width: 1px; }
  .nav-next {
    padding: 14px 28px; background: var(--ink); color: var(--paper);
    border: none; font-family: var(--sans); font-size: 14px;
    letter-spacing: 0.05em; cursor: pointer; font-weight: 500;
  }
  .nav-next:disabled { background: #C8BFB1; cursor: not-allowed; }

  /* Progress */
  .progress { margin-bottom: 32px; }
  .progress-labels {
    display: flex; justify-content: space-between; margin-bottom: 12px;
    font-size: 11px; letter-spacing: 0.05em; color: var(--ink-soft);
    flex-wrap: wrap; gap: 4px;
  }
  .progress-labels span { font-size: 12px; }
  .progress-labels span.done { color: var(--ink); }
  .progress-labels span.cur { color: var(--accent); font-weight: 600; }
  .progress-labels span.upcoming { color: #B5ADA0; }
  .progress-bar { height: 2px; background: var(--line-soft); overflow: hidden; }
  .progress-bar > div { height: 100%; background: var(--accent); transition: width 0.4s ease; }

  /* Section header */
  .section-header { margin-bottom: 32px; }
  .section-header .label {
    font-family: var(--display); font-size: 13px; letter-spacing: 0.2em;
    color: var(--accent); margin-bottom: 8px;
  }
  .section-header h2 {
    font-family: var(--serif); font-size: 26px; font-weight: 600;
    color: var(--ink); margin: 0 0 8px; letter-spacing: 0.02em;
  }
  .section-header .subtitle {
    font-size: 14px; color: var(--ink-soft); margin: 0;
  }

  /* Info form */
  .field { margin-bottom: 20px; }
  .field-label {
    display: block; font-size: 13px; font-weight: 500; color: var(--ink);
    margin-bottom: 8px; letter-spacing: 0.02em;
  }
  .field-input, .field-select {
    width: 100%; padding: 12px 14px; font-size: 15px;
    border: 1px solid var(--line); background: var(--paper);
    font-family: var(--sans); color: var(--ink);
    outline: none;
  }
  .field-input:focus, .field-select:focus { border-color: var(--accent); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .pill-group { display: flex; gap: 10px; flex-wrap: wrap; }
  .pill {
    padding: 10px 18px; background: var(--paper); color: var(--ink);
    border: 1px solid var(--line); font-family: var(--sans); font-size: 14px;
    cursor: pointer; letter-spacing: 0.02em;
    transition: all 0.15s ease;
  }
  .pill.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* Choice question */
  .question { margin-bottom: 36px; padding-bottom: 36px; border-bottom: 1px solid var(--line-soft); }
  .question:last-of-type { border-bottom: none; }
  .question .head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px; }
  .question .num {
    font-family: var(--display); font-size: 14px; color: var(--accent); font-weight: 500;
  }
  .question .title {
    font-family: var(--serif); font-size: 17px; font-weight: 600;
    color: var(--ink); margin: 0; letter-spacing: 0.02em;
  }
  .question .sub {
    font-size: 12px; color: var(--ink-faint); margin-bottom: 14px; margin-left: 32px;
  }
  .question .options {
    display: flex; flex-direction: column; gap: 8px; margin-left: 32px; margin-top: 14px;
  }
  .opt {
    text-align: left; padding: 12px 16px; cursor: pointer;
    background: var(--paper); color: var(--ink);
    border: 1px solid var(--line);
    font-family: var(--sans); font-size: 14px;
    transition: all 0.15s ease;
    display: flex; align-items: center; gap: 12px;
    width: 100%;
  }
  .opt:hover { border-color: var(--ink-faint); }
  .opt.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .opt .mark {
    width: 18px; height: 18px;
    border: 1.5px solid var(--ink-faint);
    border-radius: 4px;
    background: transparent; flex-shrink: 0;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.15s ease;
  }
  .opt.single .mark { border-radius: 50%; }
  .opt.on .mark {
    border-color: var(--paper); background: var(--paper);
  }
  .opt.on .mark svg { display: block; }
  .opt .mark svg { display: none; }
  .opt .empty-hint {
    font-size: 13px; color: var(--ink-faint); padding: 12px 16px;
    background: var(--paper); border: 1px dashed var(--line);
    width: 100%;
  }

  /* Slider question */
  .scale-q { margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--line-soft); }
  .scale-q .head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; }
  .scale-q .head-row {
    flex: 1; display: flex; justify-content: space-between; align-items: center; gap: 12px;
  }
  .scale-q .left, .scale-q .right {
    font-family: var(--serif); font-size: 15px; font-weight: 600;
  }
  .scale-q .left { color: var(--ink-faint); }
  .scale-q .right { color: var(--ink-faint); }
  .scale-q.lean-left .left { color: var(--ink); }
  .scale-q.lean-right .right { color: var(--ink); }
  .scale-q .tag {
    font-size: 10px; letter-spacing: 0.15em; color: var(--accent);
    font-family: var(--display); text-transform: uppercase; font-weight: 500;
  }
  .scale-q .hint {
    font-size: 12px; color: var(--ink-faint); margin-left: 32px;
    margin-bottom: 12px; line-height: 1.6;
  }
  .scale-q .scale-buttons {
    display: flex; justify-content: space-between; gap: 8px; margin-left: 32px;
  }
  .scale-q .sb {
    flex: 1; padding: 14px 0; cursor: pointer;
    background: var(--paper); color: var(--ink-faint);
    border: 1px solid var(--line);
    font-family: var(--display); font-size: 15px; font-weight: 500;
    transition: all 0.15s ease;
  }
  .scale-q .sb.on {
    background: var(--accent); color: var(--paper); border-color: var(--accent);
  }

  /* Easter (textarea) */
  .easter-q { margin-bottom: 32px; padding-bottom: 32px; border-bottom: 1px solid var(--line-soft); }
  .easter-q .head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px; }
  .easter-q .body { margin-left: 32px; margin-top: 10px; }
  .easter-q .hint {
    font-size: 12px; color: var(--ink-faint); margin-bottom: 10px; line-height: 1.6;
  }
  .easter-q .hint b { color: var(--accent); margin-right: 4px; font-weight: 500; }
  .easter-q textarea {
    width: 100%; padding: 12px 14px; font-size: 14px;
    border: 1px solid var(--line); background: var(--paper);
    font-family: var(--sans); color: var(--ink);
    outline: none; resize: vertical; line-height: 1.6;
  }
  .easter-q textarea:focus { border-color: var(--accent); }

  /* Report view */
  .action-group { margin-bottom: 24px; }
  .action-group-label {
    font-family: var(--display); font-size: 11px; letter-spacing: 0.2em;
    color: var(--accent); margin-bottom: 12px; text-transform: uppercase; font-weight: 500;
  }
  .action-primary { display: flex; flex-direction: column; gap: 10px; }
  .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .btn-action {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 18px; cursor: pointer; text-align: left;
    font-family: var(--sans); font-size: 15px; line-height: 1.4;
    transition: all 0.15s ease; border: 1px solid transparent;
    min-height: 56px;
  }
  .btn-action .ico { font-size: 22px; flex-shrink: 0; }
  .btn-action .lbl { font-weight: 600; flex: 1; }
  .btn-action .hint {
    font-size: 11.5px; color: var(--ink-faint); font-weight: 400;
    margin-left: auto; text-align: right; max-width: 50%;
  }
  .btn-action-primary {
    background: var(--ink); color: var(--paper); border-color: var(--ink);
  }
  .btn-action-primary .hint { color: rgba(251,248,243,0.65); }
  .btn-action-primary:active { background: #2A2420; }
  .btn-action-sec {
    background: var(--paper); color: var(--ink); border-color: var(--line);
    font-size: 13.5px; min-height: 48px; gap: 8px;
  }
  .btn-action-sec .ico { font-size: 18px; }
  .btn-action-sec:active { background: var(--bg); }

  .report-info {
    background: var(--paper); border: 1px dashed var(--line);
    padding: 18px 22px; margin: 8px 0 24px;
    font-size: 13px; color: var(--ink-soft); line-height: 1.7;
  }
  .report-info .head {
    font-weight: 600; color: var(--ink); margin-bottom: 6px;
    font-size: 13px; letter-spacing: 0.03em;
  }
  .preview-frame {
    width: 100%; height: 600px; border: 1px solid var(--line); background: var(--paper);
    margin-top: 16px;
  }

  /* Mobile RWD */
  @media (max-width: 600px) {
    body { padding: 0; }
    .wrap { padding: 24px 16px 32px; border: none; }
    .field-row { grid-template-columns: 1fr; }
    .welcome { padding: 40px 12px; }
    .welcome h1 { font-size: 26px; }
    .welcome p { font-size: 14px; }
    .stats { gap: 16px; }
    .stat .num { font-size: 28px; }
    .section-header h2 { font-size: 22px; }
    .progress-labels { font-size: 10.5px; }
    .progress-labels span { font-size: 10.5px; }
    .question { margin-bottom: 28px; padding-bottom: 28px; }
    .question .sub, .question .options { margin-left: 0; }
    .question .head { gap: 8px; }
    .question .num { font-size: 12px; }
    .question .title { font-size: 15.5px; }
    .opt {
      padding: 14px 14px; font-size: 14.5px; min-height: 48px;
    }
    .scale-q { margin-bottom: 26px; padding-bottom: 22px; }
    .scale-q .head-row { font-size: 13px; }
    .scale-q .left, .scale-q .right { font-size: 13.5px; }
    .scale-q .hint, .scale-q .scale-buttons { margin-left: 0; }
    .scale-q .hint { font-size: 11.5px; }
    .scale-q .sb { padding: 16px 0; font-size: 16px; min-height: 48px; }
    .easter-q .body { margin-left: 0; }
    .easter-q textarea { font-size: 16px; }
    .nav-buttons { gap: 8px; flex-direction: column-reverse; }
    .nav-buttons .btn-secondary, .nav-buttons .nav-next {
      width: 100%; padding: 14px; min-height: 48px; font-size: 15px;
    }
    .btn-action { padding: 14px 14px; min-height: 52px; font-size: 14.5px; gap: 10px; }
    .btn-action .ico { font-size: 20px; }
    .btn-action .hint { display: none; }
    .btn-action-sec { font-size: 12.5px; padding: 12px 8px; min-height: 44px; }
    .btn-action-sec .ico { font-size: 16px; }
    .action-row { grid-template-columns: 1fr 1fr; gap: 6px; }
    .field-input, .field-select {
      font-size: 16px;
    }
    .pill { font-size: 14px; padding: 10px 16px; min-height: 44px; }
    .preview-frame { height: 500px; }
  }
  @media (max-width: 380px) {
    .progress-labels { display: none; }
    .progress-labels:before {
      content: attr(data-current);
      display: block; font-size: 12px; color: var(--accent);
      letter-spacing: 0.1em; font-weight: 600;
    }
  }

  /* Prevent iOS Safari zoom on input focus */
  @supports (-webkit-touch-callout: none) {
    input, select, textarea { font-size: 16px !important; }
  }
</style>
</head>

function computeTreatmentOptions(specialtyIdxs) {
  const seen = new Set();
  const out = [];
  (specialtyIdxs || []).forEach(idx => {
    const sp = SPECIALTIES[idx];
    const list = TREATMENTS_BY_SPECIALTY[sp] || [];
    list.forEach(t => { if (!seen.has(t)) { seen.add(t); out.push(t); } });
  });
  return out;
}

function escapeHtml(s) {
  if (s === undefined || s === null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function getQ(qList, id) { return qList.find(x => x.id === id); }

function multiToText(q, val) {
  if (!val || val.length === 0) return '無';
  if (q && q.options) return val.map(i => q.options[i]).filter(Boolean).join('、');
  return val.filter(Boolean).join('、');
}

function singleToText(q, val) {
  if (val === undefined || val === null) return '〔未填〕';
  if (q && q.options) return q.options[val] || '〔未填〕';
  return String(val);
}

function getKeywords(personality) {
  const scored = PERSONALITY_SCALES.map(scale => {
    const score = personality[scale.id] != null ? personality[scale.id] : 3;
    return Object.assign({}, scale, { score: score, distance: Math.abs(score - 3) });
  });
  scored.sort((a, b) => b.distance - a.distance);
  const top = scored.slice(0, 6).filter(s => s.distance >= 1);
  return top.map(s => s.score < 3 ? s.left : s.right);
}

function calculateRatios(personality) {
  let r = { professional: 25, observation: 25, humor: 20, selfExp: 10, advocacy: 10, treatments: 10 };
  const p = personality;
  const v = id => p[id] != null ? p[id] : 3;

  // p1 學術精準派 (low) → professional up；生活轉譯派 (high) → humor / observation up
  if (v('p1') <= 2) { r.professional += 5; r.humor -= 3; }
  if (v('p1') >= 4) { r.observation += 5; r.humor += 3; r.professional -= 5; }

  // p2 數據實證 (low) → professional up；經驗判斷 (high) → observation up
  if (v('p2') <= 2) { r.professional += 8; r.observation -= 3; r.humor -= 3; }
  if (v('p2') >= 4) { r.observation += 8; r.advocacy += 3; r.professional -= 5; }

  // p3 SOP (low) → treatments up；客製 (high) → advocacy up
  if (v('p3') <= 2) { r.treatments += 5; r.advocacy -= 3; }
  if (v('p3') >= 4) { r.advocacy += 5; r.observation += 3; r.treatments -= 5; }

  // p4 講師權威 (low) → professional up；陪伴朋友 (high) → observation / humor up
  if (v('p4') <= 2) { r.professional += 8; r.humor -= 5; r.observation -= 3; }
  if (v('p4') >= 4) { r.observation += 8; r.humor += 5; r.professional -= 5; }

  // p5 解決問題 (low) → treatments up；建立關係 (high) → observation up
  if (v('p5') <= 2) { r.treatments += 5; r.professional += 3; r.observation -= 5; r.humor -= 3; }
  if (v('p5') >= 4) { r.observation += 5; r.humor += 3; r.treatments -= 5; }

  // p6 主動建議 (low) → advocacy / treatments up；提供選項 (high) → observation up
  if (v('p6') <= 2) { r.advocacy += 5; r.treatments += 3; r.observation -= 3; }
  if (v('p6') >= 4) { r.observation += 5; r.advocacy -= 3; }

  // p7 保守 (low) → observation up；積極 (high) → treatments up
  if (v('p7') <= 2) { r.observation += 5; r.advocacy += 3; r.treatments -= 5; }
  if (v('p7') >= 4) { r.treatments += 5; r.selfExp += 3; r.observation -= 3; }

  // p8 細節完美 (low) → professional up；大方向 (high) → humor up
  if (v('p8') <= 2) { r.professional += 5; r.humor -= 3; }
  if (v('p8') >= 4) { r.humor += 5; r.professional -= 5; }

  // p9 技術精準 (low) → professional / treatments up；美感整體 (high) → selfExp / advocacy up
  if (v('p9') <= 2) { r.professional += 5; r.treatments += 3; r.selfExp -= 3; }
  if (v('p9') >= 4) { r.selfExp += 5; r.advocacy += 3; r.treatments -= 3; }

  // p10 高冷 (low) → professional up；熱情 (high) → observation / humor up
  if (v('p10') <= 2) { r.professional += 5; r.humor -= 5; }
  if (v('p10') >= 4) { r.observation += 5; r.humor += 3; r.professional -= 3; }

  // p11 自嘲幽默 (low) → humor up；穩重 (high) → professional up
  if (v('p11') <= 2) { r.humor += 8; r.advocacy -= 3; r.selfExp -= 3; }
  if (v('p11') >= 4) { r.humor -= 8; r.professional += 5; r.observation += 3; }

  // p12 內斂 (low) → professional up；外放 (high) → humor / selfExp up
  if (v('p12') <= 2) { r.professional += 5; r.humor -= 3; }
  if (v('p12') >= 4) { r.humor += 5; r.selfExp += 3; }

  // p13 直接坦白 (low) → advocacy up；委婉 (high) → observation up
  if (v('p13') <= 2) { r.advocacy += 8; r.observation += 3; r.humor -= 3; r.treatments -= 3; }
  if (v('p13') >= 4) { r.observation += 5; r.advocacy -= 3; }

  // p14 重視療效 (low) → treatments up；重視體驗 (high) → observation up
  if (v('p14') <= 2) { r.treatments += 5; r.professional += 3; r.observation -= 3; }
  if (v('p14') >= 4) { r.observation += 5; r.humor += 3; r.treatments -= 3; }

  // p15 高端精緻 (low) → selfExp up；日常親民 (high) → humor up
  if (v('p15') <= 2) { r.selfExp += 5; r.advocacy += 3; r.humor -= 3; }
  if (v('p15') >= 4) { r.humor += 5; r.observation += 3; r.selfExp -= 3; }

  // Clamp negatives, normalize to 100
  Object.keys(r).forEach(k => { if (r[k] < 0) r[k] = 0; });
  let total = 0;
  Object.keys(r).forEach(k => { total += r[k]; });
  if (total === 0) {
    // all zero – fallback uniform
    return { professional: 17, observation: 17, humor: 17, selfExp: 17, advocacy: 16, treatments: 16 };
  }
  Object.keys(r).forEach(k => { r[k] = Math.round(r[k] / total * 100); });
  let sum = 0; Object.keys(r).forEach(k => { sum += r[k]; });
  if (sum !== 100) {
    let maxKey = Object.keys(r)[0];
    Object.keys(r).forEach(k => { if (r[k] > r[maxKey]) maxKey = k; });
    r[maxKey] += (100 - sum);
  }
  return r;
}

function inferTone(personality) {
  const p = personality;

  const tones = [];
  if (v('p10') >= 4) tones.push('溫和親近');
  if (v('p10') <= 2) tones.push('冷靜專業');
  if (v('p11') <= 2) tones.push('輕鬆幽默');
  if (v('p11') >= 4) tones.push('沉穩內斂');
  if (v('p1') <= 2) tones.push('學術嚴謹');
  if (v('p1') >= 4) tones.push('生活感強');
  if (v('p15') <= 2) tones.push('精緻質感');
  if (v('p15') >= 4) tones.push('日常親民');
  if (v('p13') <= 2) tones.push('坦白直接');
  if (v('p4') <= 2) tones.push('權威穩定');
  return tones.length ? tones : ['平衡中性'];

    '其他': ['專業知識分享', '診間觀察', '醫師個人主張', '日常生活感']
  };
  return map[primary] || map['其他'];
}

function generateBio(data) {
  const info = data.info, basic = data.basic, personality = data.personality, easter = data.easter;
  const sps = (basic.specialty || []).map(i => SPECIALTIES[i]).filter(Boolean);
  const primarySp = sps[0] || '';
  const treatments = (basic.treatments || []).slice(0, 2).join(' · ');
  const v = id => personality[id] != null ? personality[id] : 3;
  const isHumorous = v('p11') <= 2;
  const isAuthority = v('p4') <= 2;
  const isPersonal = v('p15') >= 4 || v('p10') >= 4;
  const tic = (easter.e3 || '').split(/[，,。\n]/)[0].trim();

  let igBio = (info.name || '〔姓名〕') + '・' + (info.title || '〔職稱〕') + '\n';
  if (isAuthority && info.credentials) igBio += info.credentials + '\n';
  if (treatments) igBio += treatments + '\n';
  igBio += (info.clinic || '〔診所名稱〕');
  if (isPersonal && tic) igBio += '\n🥄 ' + tic;

  let threadsBio = (info.name || '〔姓名〕') + ' · ' + primarySp + '醫師\n';
  if (info.credentials) threadsBio += info.credentials + '\n';
  if (isHumorous) threadsBio += '診間日常 / 衛教 / 偶爾翻譯年糕';
  else threadsBio += '專業衛教 / 診間觀察';

  return { ig: igBio, threads: threadsBio };
}

// ===== Render Helpers =====

function renderProgress(currentSection) {
  const total = SECTION_LABELS.length;
  let labels = '';
  SECTION_LABELS.forEach((label, i) => {
    let cls = 'upcoming';
    if (i === currentSection) cls = 'cur';
    else if (i < currentSection) cls = 'done';
    labels += '<span class="' + cls + '">' + label + '</span>';
  });
  const pct = ((currentSection + 1) / total) * 100;
  return '<div class="progress"><div class="progress-labels">' + labels + '</div>'
    + '<div class="progress-bar"><div style="width:' + pct + '%"></div></div></div>';
}

function renderSectionHeader(num, title, subtitle) {
  return '<div class="section-header">'
    + '<div class="label">SECTION ' + num + '</div>'
    + '<h2>' + escapeHtml(title) + '</h2>'
    + (subtitle ? '<div class="subtitle">' + escapeHtml(subtitle) + '</div>' : '')
    + '</div>';
}

function renderNavButtons(showBack, nextLabel, disabled) {
  const back = showBack
    ? '<button class="btn-secondary" data-action="back">← 上一步</button>'
    : '<div class="placeholder"></div>';
  const next = '<button class="nav-next" data-action="next"' + (disabled ? ' disabled' : '') + '>'
    + escapeHtml(nextLabel || '繼續') + ' →</button>';
  return '<div class="nav-buttons">' + back + next + '</div>';
}

function renderChoiceQuestion(q, value, index, options) {
  const opts = options || q.options || [];
  const isSingle = q.type === 'single';
  let html = '<div class="question" data-qid="' + escapeHtml(q.id) + '">';
  html += '<div class="head"><span class="num">' + String(index).padStart(2, '0') + '</span>';
  html += '<h3 class="title">' + escapeHtml(q.title) + '</h3></div>';
  if (q.subtitle) html += '<div class="sub">' + escapeHtml(q.subtitle) + '</div>';
  html += '<div class="options">';
  if (opts.length === 0) {
    html += '<div class="empty-hint">（請先回答上一題：選擇專科主軸後，這裡會自動帶出對應的療程選項）</div>';
  } else {
    opts.forEach((opt, i) => {
      let selected;
      if (q.type === 'dynamic-multi') {
        selected = (value || []).indexOf(opt) !== -1;
      } else if (isSingle) {
        selected = value === i;
      } else {
        selected = (value || []).indexOf(i) !== -1;
      }
      const cls = 'opt' + (isSingle ? ' single' : '') + (selected ? ' on' : '');
      const valueAttr = q.type === 'dynamic-multi' ? escapeHtml(opt) : i;
      html += '<button class="' + cls + '" data-qid="' + escapeHtml(q.id) + '" data-value="' + valueAttr + '">'
        + '<span class="mark">' + CHECKMARK_SVG + '</span>'
        + escapeHtml(opt) + '</button>';
    });
  }
  html += '</div></div>';
  return html;
}

function renderSliderQuestion(scale, value, index) {
  const v = value != null ? value : 3;
  const leanCls = v < 3 ? 'lean-left' : (v > 3 ? 'lean-right' : '');
  let html = '<div class="scale-q ' + leanCls + '" data-qid="' + escapeHtml(scale.id) + '">';
  html += '<div class="head"><span class="num">' + String(index).padStart(2, '0') + '</span>';
  html += '<div class="head-row">';
  html += '<span class="left">' + escapeHtml(scale.left) + '</span>';
  html += '<span class="tag">' + escapeHtml(scale.tag) + '</span>';
  html += '<span class="right">' + escapeHtml(scale.right) + '</span>';
  html += '</div></div>';
  if (scale.hint) html += '<div class="hint">' + escapeHtml(scale.hint) + '</div>';
  html += '<div class="scale-buttons">';
  for (let n = 1; n <= 5; n++) {
    html += '<button class="sb' + (v === n ? ' on' : '') + '" data-qid="' + escapeHtml(scale.id) + '" data-value="' + n + '">' + n + '</button>';
  }
  html += '</div></div>';
  return html;
}

function renderEasterQuestion(q, value, index) {
  let html = '<div class="easter-q" data-qid="' + escapeHtml(q.id) + '">';
  html += '<div class="head"><span class="num" style="font-family:var(--display);font-size:14px;color:var(--accent);font-weight:500;">' + String(index).padStart(2, '0') + '</span>';
  html += '<h3 style="font-family:var(--serif);font-size:17px;font-weight:600;color:var(--ink);margin:0;">' + escapeHtml(q.title) + '</h3></div>';
  html += '<div class="body"><div class="hint"><b>提示：</b>' + escapeHtml(q.hints) + '</div>';
  html += '<textarea data-qid="' + escapeHtml(q.id) + '" rows="3" placeholder="' + escapeHtml(q.placeholder) + '">' + escapeHtml(value || '') + '</textarea>';
  html += '</div></div>';
  return html;
}

// ===== Main render & event binding =====

function render() {
  const root = document.getElementById('app-root');
  let html;
  switch (state.step) {
    case 0: html = renderWelcome(); break;
    case 1: html = renderInfoForm(); break;
    case 2: html = renderBasicForm(); break;
    case 3: html = renderPersonalityForm(); break;
    case 4: html = renderBoundaryForm(); break;
    case 5: html = renderEasterForm(); break;
    case 6: html = renderReportView(); break;
    default: html = renderWelcome();
  }
  root.innerHTML = html;
  bindEvents();
}

function setStep(n) {
  state.step = n;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function bindEvents() {
  const root = document.getElementById('app-root');

  // Action buttons (data-action)
  root.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', e => {
      const action = el.getAttribute('data-action');
      handleAction(action);
    });
  });

  // Choice option buttons (data-qid + data-value)
  root.querySelectorAll('.opt[data-qid]').forEach(el => {
    el.addEventListener('click', e => {
      const qid = el.getAttribute('data-qid');
      const valAttr = el.getAttribute('data-value');
      handleChoiceClick(qid, valAttr);
    });
  });

  // Scale slider buttons
  root.querySelectorAll('.sb[data-qid]').forEach(el => {
    el.addEventListener('click', e => {
      const qid = el.getAttribute('data-qid');
      const val = parseInt(el.getAttribute('data-value'), 10);
      state.personality[qid] = val;
      // Just re-render the form
      render();
    });
  });

  // Info inputs (text/number)
  root.querySelectorAll('[data-info]').forEach(el => {
    el.addEventListener('input', e => {
      const key = el.getAttribute('data-info');
      state.info[key] = el.value;
      // Re-enable/disable next button without losing focus → toggle disabled directly
      updateInfoNextBtn();
    });
  });

  // Info pill buttons (gender)
  root.querySelectorAll('[data-info-pill]').forEach(el => {
    el.addEventListener('click', e => {
      const key = el.getAttribute('data-info-pill');
      const val = el.getAttribute('data-value');
      state.info[key] = val;
      render();
    });
  });

  // Easter textareas
  root.querySelectorAll('textarea[data-qid]').forEach(el => {
    el.addEventListener('input', e => {
      const qid = el.getAttribute('data-qid');
      state.easter[qid] = el.value;
    });
  });
}

function updateInfoNextBtn() {
  const d = state.info;
  const ready = d.name && d.clinic && d.title && d.gender && d.age && d.attendingYears;
  const btn = document.querySelector('.nav-next[data-action="next"]');
  if (btn) {
    if (ready) btn.removeAttribute('disabled');
    else btn.setAttribute('disabled', 'disabled');
  }
}

function handleAction(action) {
  switch (action) {
    case 'start':
      setStep(1); break;
    case 'back':
      if (state.step > 0) setStep(state.step - 1); break;
    case 'next':
      if (state.step < 6) setStep(state.step + 1); break;
    case 'share':
      shareReport(); break;
    case 'copy':
      copyTextReport(); break;
    case 'email':
      emailReport(); break;
    case 'download':
      downloadReport(); break;
    case 'print':
      openPrintWindow(); break;
    case 'preview':
      togglePreview(); break;
    case 'restart':
      reset(); break;
  }
}

function handleChoiceClick(qid, valAttr) {
  // 1. 看是哪個 question collection
  let store, q;
  if (BASIC_QUESTIONS.find(x => x.id === qid)) {
    store = state.basic; q = BASIC_QUESTIONS.find(x => x.id === qid);
  } else if (BOUNDARY_QUESTIONS.find(x => x.id === qid)) {
    store = state.boundary; q = BOUNDARY_QUESTIONS.find(x => x.id === qid);
  } else {
    return;
  }

  if (q.type === 'single') {
    store[qid] = parseInt(valAttr, 10);
  } else if (q.type === 'multi') {
    const idx = parseInt(valAttr, 10);
    const cur = store[qid] || [];
    const pos = cur.indexOf(idx);
    if (pos >= 0) {
      store[qid] = cur.filter(x => x !== idx);
    } else {
      if (q.max && cur.length >= q.max) return;
      store[qid] = cur.concat([idx]);
    }
  } else if (q.type === 'dynamic-multi') {
    // value is the actual string
    const cur = store[qid] || [];
    const pos = cur.indexOf(valAttr);
    if (pos >= 0) {
      store[qid] = cur.filter(x => x !== valAttr);
    } else {
      if (q.max && cur.length >= q.max) return;
      store[qid] = cur.concat([valAttr]);
    }
  }

  // 若 specialty 改變，清掉 treatments 中已不存在的選項
  if (qid === 'specialty') {
    const newOpts = computeTreatmentOptions(state.basic.specialty || []);
    state.basic.treatments = (state.basic.treatments || []).filter(t => newOpts.indexOf(t) !== -1);
  }

  render();
}

function downloadReport() {
  const html = generateHtmlReport(state);
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const safeName = (state.info.name || 'doctor').replace(/[\/\\:*?"<>|]/g, '');
  const dateTag = new Date().toISOString().slice(0, 10);
  a.download = safeName + '_個人品牌定位報告_' + dateTag + '.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

  t += '  業配 / 異業合作：' + singleToText(getQ(BOUNDARY_QUESTIONS, 'b6'), boundary.b6) + '\n';
  t += '  負面留言處理：' + singleToText(getQ(BOUNDARY_QUESTIONS, 'b7'), boundary.b7) + '\n';
  t += '  內容審核權：' + singleToText(getQ(BOUNDARY_QUESTIONS, 'b8'), boundary.b8) + '\n\n';

  t += '◆ 人格立體度素材池\n';
  t += '  生活興趣：' + (easter.e1 || '〔未填〕') + '\n';
  t += '  職業病：' + (easter.e2 || '〔未填〕') + '\n';
  t += '  口頭禪：' + (easter.e3 || '〔未填〕') + '\n';
  t += '  喜歡的對標：' + (easter.e4 || '〔未填〕') + '\n';
  t += '  不想變成的：' + (easter.e5 || '〔未填〕') + '\n\n';

  t += '◆ 執行條件\n';
  t += '  鏡頭舒適度：' + singleToText(getQ(BASIC_QUESTIONS, 'cameraComfort'), basic.cameraComfort) + '\n';
  t += '  每週可投入時間：' + singleToText(getQ(BASIC_QUESTIONS, 'timeAvailable'), basic.timeAvailable) + '\n';
  t += '\n───────────────────\n';
  t += '本報告由「醫師個人品牌人設量表」自動產出。';
  return t;
}

// 點「複製報告全文」：把純文字版本複製到剪貼簿（可貼到 LINE）
function copyTextReport() {
  const text = generateTextReport(state);
  const fallback = () => {
    // 退回到 textarea + execCommand（舊版瀏覽器）
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showToast('已複製報告全文，可直接貼到 LINE / Email'); }
    catch (e) { showToast('複製失敗，請手動選取下方文字'); showTextFallback(text); }
    document.body.removeChild(ta);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text)
      .then(() => showToast('已複製報告全文，可直接貼到 LINE / Email'))
      .catch(fallback);
  } else {
    fallback();
  }
}

// 點「Email 寄給團隊」：開啟手機郵件 app，自動帶入主旨與內文
function emailReport() {
  const text = generateTextReport(state);
  const subject = (state.info.name || '醫師') + ' - 個人品牌定位報告';
  const body = text;
  // mailto: 對長度有限制，多數瀏覽器約 2000 字以內較穩定。內文若過長則改貼到剪貼簿並用提示。
  const encodedBody = encodeURIComponent(body);
  if (encodedBody.length > 1900) {
    // 內文太長，先複製到剪貼簿，再開啟空白郵件
    copyTextReport();
    setTimeout(() => {
      const mailto = 'mailto:' + encodeURIComponent(TEAM_EMAIL || '')
        + '?subject=' + encodeURIComponent(subject)
        + '&body=' + encodeURIComponent('（報告全文已複製到剪貼簿，請按貼上）');
      window.location.href = mailto;
    }, 400);
  } else {
    const mailto = 'mailto:' + encodeURIComponent(TEAM_EMAIL || '')
      + '?subject=' + encodeURIComponent(subject) + '&body=' + encodedBody;
    window.location.href = mailto;
  }
}

// 點「分享」：呼叫手機系統分享面板（LINE / Messenger / Email 都可選）
function shareReport() {
  const text = generateTextReport(state);
  const title = (state.info.name || '醫師') + ' - 個人品牌定位報告';
  if (navigator.share) {
    navigator.share({ title: title, text: text })
      .catch(err => {
        if (err && err.name !== 'AbortError') {
          showToast('分享失敗，已改為複製到剪貼簿');
          copyTextReport();
        }
      });
  } else {
    showToast('此瀏覽器不支援系統分享，已改為複製到剪貼簿');
    copyTextReport();
  }
}

// 簡單的提示（toast）
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;left:50%;bottom:32px;transform:translateX(-50%);background:#1A1614;color:#FBF8F3;padding:12px 20px;font-size:14px;font-family:"Noto Sans TC",sans-serif;letter-spacing:0.04em;z-index:9999;opacity:0;transition:opacity 0.25s;max-width:90%;text-align:center;line-height:1.5;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2600);
}

// 萬一 clipboard 完全不行，顯示一個 textarea 讓使用者自己選取
function showTextFallback(text) {
  const c = document.getElementById('preview-container');
  if (!c) return;
  c.innerHTML = '<div style="margin-top:16px;padding:14px;background:#fff;border:1px dashed #B85C38;">'
    + '<div style="font-size:12px;color:#B85C38;letter-spacing:0.1em;margin-bottom:8px;">複製失敗的備援：請長按下方文字 → 全選 → 複製</div>'
    + '<textarea readonly style="width:100%;height:200px;font-size:13px;padding:10px;border:1px solid #D4CCC0;background:#FBF8F3;font-family:inherit;">'
    + escapeHtml(text) + '</textarea></div>';
}

function openPrintWindow() {
  const html = generateHtmlReport(state);
  const w = window.open('', '_blank');
  if (!w) {
    alert('瀏覽器封鎖了新分頁，請允許彈出視窗');
    return;
  }
  w.document.open();
  w.document.write(html);
  w.document.close();
  setTimeout(() => { try { w.focus(); w.print(); } catch (e) {} }, 600);
}

let previewOpen = false;
function togglePreview() {
  const container = document.getElementById('preview-container');
  if (!container) return;
  if (previewOpen) {
    container.innerHTML = '';
    previewOpen = false;
  } else {
    const html = generateHtmlReport(state);
    container.innerHTML = '<iframe class="preview-frame" srcdoc="' + escapeHtml(html) + '"></iframe>';
    previewOpen = true;
  }
}

function reset() {
  state.info = { name: '', clinic: '', title: '', credentials: '', gender: '', age: '', attendingYears: '' };
  state.basic = {};
  state.personality = PERSONALITY_SCALES.reduce((acc, s) => { acc[s.id] = 3; return acc; }, {});
  state.boundary = {};
  state.easter = {};
  previewOpen = false;
  setStep(0);
}

// 初始化
document.addEventListener('DOMContentLoaded', render);
</script>
